rules:
- instruction: Always use TypeScript strict mode — no 'any', no implicit returns
  priority: 9
- instruction: Use Tailwind core utility classes only (no compiler-dependent classes)
  priority: 8
- instruction: Dark theme by default — use CSS variables for all colors
  priority: 8
- instruction: Prefer functional components with hooks over class components
  priority: 7
- instruction: Error handling with specific types, not generic catches
  priority: 7
- instruction: Use descriptive variable names — no single letters except loop iterators
  priority: 6
- instruction: "Font preferences: Cormorant Garamond for display, system fonts for body"
  priority: 5
- instruction: When building UI, use onMouseDown with e.preventDefault() for interactive elements to avoid multi-click bugs
  priority: 6
