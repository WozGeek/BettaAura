  <text x="238" y="205" fill="#00d97e" font-size="8" opacity="0.7">📄</text>
  <text x="252" y="205" fill="#ccc" font-size="8.5">developer.yaml</text>
  <text x="238" y="216" fill="#444" font-size="7">TypeScript · Python · Cursor</text>

  <rect x="228" y="228" width="128" height="28" rx="4" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="238" y="239" fill="#00d97e" font-size="8" opacity="0.7">📄</text>
  <text x="252" y="239" fill="#ccc" font-size="8.5">writer.yaml</text>
  <text x="238" y="250" fill="#444" font-size="7">style · rules · tone</text>

  <rect x="228" y="262" width="128" height="28" rx="4" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="238" y="273" fill="#00d97e" font-size="8" opacity="0.7">📄</text>
  <text x="252" y="273" fill="#ccc" font-size="8.5">work.yaml</text>
  <text x="238" y="284" fill="#444" font-size="7">role · projects · context</text>

  <text x="292" y="303" text-anchor="middle" fill="#333" font-size="8">+ custom packs</text>

