<svg viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00d97e" opacity="0.7"/>
    </marker>
    <marker id="arrowDim" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00d97e" opacity="0.35"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="520" fill="url(#bg)" rx="12"/>
  <rect width="860" height="520" fill="none" stroke="#1e1e1e" stroke-width="1" rx="12"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.15" opacity="0.08"/>
  </pattern>
  <rect width="860" height="520" fill="url(#grid)" rx="12"/>

  <!-- Header -->
  <text x="430" y="36" text-anchor="middle" fill="#00d97e" font-size="10" letter-spacing="6" opacity="0.5">AURA-CTX · ARCHITECTURE</text>

  <!-- ═══════════════ COLUMN 1 — INPUT ═══════════════ -->
  <!-- User card -->
  <rect x="30" y="60" width="130" height="56" rx="6" fill="url(#cardGrad)" stroke="#00d97e" stroke-width="1" opacity="0.9"/>
  <text x="95" y="83" text-anchor="middle" fill="#00d97e" font-size="18" filter="url(#subtleGlow)">◈</text>
  <text x="95" y="103" text-anchor="middle" fill="#00d97e" font-size="10" letter-spacing="1">YOU</text>

  <!-- Commands block -->
  <rect x="30" y="148" width="130" height="164" rx="6" fill="url(#cardGrad)" stroke="#333" stroke-width="1"/>
  <text x="95" y="168" text-anchor="middle" fill="#555" font-size="8" letter-spacing="3">COMMANDS</text>
  <line x1="46" y1="175" x2="144" y2="175" stroke="#222" stroke-width="1"/>

  <!-- Command items -->
  <text x="46" y="196" fill="#00d97e" font-size="9.5" opacity="0.85">aura scan</text>
  <text x="46" y="196" fill="none" font-size="9.5"/>
  <text x="136" y="196" text-anchor="end" fill="#444" font-size="8">detect stack</text>

  <text x="46" y="216" fill="#00d97e" font-size="9.5" opacity="0.85">aura onboard</text>
  <text x="136" y="216" text-anchor="end" fill="#444" font-size="8">5 questions</text>

  <text x="46" y="236" fill="#00d97e" font-size="9.5" opacity="0.85">aura import</text>
  <text x="136" y="236" text-anchor="end" fill="#444" font-size="8">from exports</text>

  <text x="46" y="256" fill="#00d97e" font-size="9.5" opacity="0.85">aura setup</text>
  <text x="136" y="256" text-anchor="end" fill="#444" font-size="8">auto-config</text>

  <text x="46" y="276" fill="#00d97e" font-size="9.5" opacity="0.85">aura serve</text>
  <text x="136" y="276" text-anchor="end" fill="#444" font-size="8">start MCP</text>

  <text x="46" y="296" fill="#00d97e" font-size="9.5" opacity="0.85">aura audit</text>
  <text x="136" y="296" text-anchor="end" fill="#444" font-size="8">scan secrets</text>

