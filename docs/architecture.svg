  <rect x="438" y="266" width="118" height="30" rx="3" fill="#0a1f14" stroke="#1a3a2a" stroke-width="1"/>
  <text x="448" y="278" fill="#00d97e" font-size="8" opacity="0.9">L3 · all_context</text>
