  <text x="292" y="168" text-anchor="middle" fill="#555" font-size="8" letter-spacing="3">CONTEXT PACKS</text>
  <text x="292" y="180" text-anchor="middle" fill="#333" font-size="7">~/.aura/packs/</text>
  <line x1="228" y1="186" x2="356" y2="186" stroke="#222" stroke-width="1"/>

