  <rect x="620" y="148" width="112" height="30" rx="5" fill="url(#cardGrad)" stroke="#252525" stroke-width="1"/>
  <text x="634" y="159" fill="#00d97e" font-size="10">◈</text>
  <text x="650" y="158" fill="#ccc" font-size="9">Claude Desktop</text>
  <text x="650" y="170" fill="#444" font-size="7">auto-configured</text>

  <rect x="620" y="186" width="112" height="30" rx="5" fill="url(#cardGrad)" stroke="#252525" stroke-width="1"/>
  <text x="634" y="197" fill="#00d97e" font-size="10">◈</text>
  <text x="650" y="196" fill="#ccc" font-size="9">Claude Code</text>
  <text x="650" y="208" fill="#444" font-size="7">auto-configured</text>

  <rect x="620" y="224" width="112" height="30" rx="5" fill="url(#cardGrad)" stroke="#252525" stroke-width="1"/>
  <text x="634" y="235" fill="#00d97e" font-size="10">⬡</text>
  <text x="650" y="234" fill="#ccc" font-size="9">Cursor IDE</text>
  <text x="650" y="246" fill="#444" font-size="7">auto-configured</text>

  <rect x="620" y="262" width="112" height="30" rx="5" fill="url(#cardGrad)" stroke="#252525" stroke-width="1"/>
  <text x="634" y="273" fill="#00d97e" font-size="10">⬡</text>
  <text x="650" y="272" fill="#ccc" font-size="9">Windsurf IDE</text>
  <text x="650" y="284" fill="#444" font-size="7">auto-configured</text>

  <!-- Col B -->
  <rect x="740" y="148" width="100" height="30" rx="5" fill="url(#cardGrad)" stroke="#252525" stroke-width="1"/>
  <text x="754" y="159" fill="#00d97e" font-size="10">⬡</text>
  <text x="770" y="158" fill="#ccc" font-size="9">VS Code</text>
  <text x="770" y="170" fill="#444" font-size="7">auto-configured</text>

  <rect x="740" y="186" width="100" height="30" rx="5" fill="url(#cardGrad)" stroke="#252525" stroke-width="1"/>
  <text x="754" y="197" fill="#00d97e" font-size="10">◆</text>
  <text x="770" y="196" fill="#ccc" font-size="9">Gemini CLI</text>
  <text x="770" y="208" fill="#444" font-size="7">auto-configured</text>

  <rect x="740" y="224" width="100" height="30" rx="5" fill="url(#cardGrad)" stroke="#252525" stroke-width="1"/>
  <text x="754" y="235" fill="#00d97e" font-size="10">◆</text>
  <text x="770" y="234" fill="#ccc" font-size="9">ChatGPT</text>
  <text x="770" y="246" fill="#444" font-size="7">SSE · manual</text>

  <rect x="740" y="262" width="100" height="30" rx="5" fill="url(#cardGrad)" stroke="#252525" stroke-width="1"/>
  <text x="754" y="273" fill="#00d97e" font-size="10">◆</text>
  <text x="770" y="272" fill="#ccc" font-size="9">Codex CLI</text>
  <text x="770" y="284" fill="#444" font-size="7">auto-configured</text>

  <!-- Vertical connector lines between tool cols -->
  <line x1="732" y1="163" x2="740" y2="163" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="732" y1="201" x2="740" y2="201" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="732" y1="239" x2="740" y2="239" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="732" y1="277" x2="740" y2="277" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Connector from MCP to tool grid (branching lines) -->
  <line x1="620" y1="163" x2="732" y2="163" stroke="#00d97e" stroke-width="0.8" opacity="0.2"/>
  <line x1="620" y1="201" x2="732" y2="201" stroke="#00d97e" stroke-width="0.8" opacity="0.2"/>
  <line x1="620" y1="239" x2="732" y2="239" stroke="#00d97e" stroke-width="0.8" opacity="0.2"/>
  <line x1="620" y1="277" x2="732" y2="277" stroke="#00d97e" stroke-width="0.8" opacity="0.2"/>

  <!-- ═══════════════ BOTTOM ROW — PROPERTIES ═══════════════ -->
  <rect x="30" y="352" width="800" height="56" rx="6" fill="#0a0a0a" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Properties -->
  <text x="100" y="374" text-anchor="middle" fill="#00d97e" font-size="16" opacity="0.7">⚡</text>
  <text x="100" y="392" text-anchor="middle" fill="#444" font-size="8">localhost only</text>
  <text x="100" y="402" text-anchor="middle" fill="#444" font-size="8">no latency</text>

  <line x1="180" y1="362" x2="180" y2="398" stroke="#1e1e1e" stroke-width="1"/>

  <text x="260" y="374" text-anchor="middle" fill="#00d97e" font-size="16" opacity="0.7">🔒</text>
  <text x="260" y="392" text-anchor="middle" fill="#444" font-size="8">secret scanning</text>
  <text x="260" y="402" text-anchor="middle" fill="#444" font-size="8">auto-redact</text>

  <line x1="340" y1="362" x2="340" y2="398" stroke="#1e1e1e" stroke-width="1"/>

  <text x="430" y="374" text-anchor="middle" fill="#00d97e" font-size="16" opacity="0.7">📦</text>
  <text x="430" y="392" text-anchor="middle" fill="#444" font-size="8">portable by design</text>
  <text x="430" y="402" text-anchor="middle" fill="#444" font-size="8">copy ~/.aura/packs/</text>

  <line x1="520" y1="362" x2="520" y2="398" stroke="#1e1e1e" stroke-width="1"/>

  <text x="610" y="374" text-anchor="middle" fill="#00d97e" font-size="16" opacity="0.7">🔄</text>
  <text x="610" y="392" text-anchor="middle" fill="#444" font-size="8">hot-reload</text>
  <text x="610" y="402" text-anchor="middle" fill="#444" font-size="8">--watch mode</text>

  <line x1="700" y1="362" x2="700" y2="398" stroke="#1e1e1e" stroke-width="1"/>

  <text x="775" y="374" text-anchor="middle" fill="#00d97e" font-size="16" opacity="0.7">🚫</text>
  <text x="775" y="392" text-anchor="middle" fill="#444" font-size="8">no cloud</text>
  <text x="775" y="402" text-anchor="middle" fill="#444" font-size="8">no telemetry</text>

  <!-- Footer -->
  <text x="430" y="444" text-anchor="middle" fill="#222" font-size="8" letter-spacing="2">8,500+ LINES · 151 TESTS · 24 COMMANDS · 14 TEMPLATES · MIT LICENSE</text>

  <!-- Subtle corner decoration -->
  <text x="44" y="490" fill="#1a1a1a" font-size="9">pip install -U aura-ctx</text>
  <text x="816" y="490" text-anchor="end" fill="#1a1a1a" font-size="9">github.com/WozGeek/aura-ctx</text>
