<svg viewBox="0 0 860 340" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Courier New', monospace">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="340" fill="url(#bg2)" rx="12"/>
  <rect width="860" height="340" fill="none" stroke="#1a1a1a" stroke-width="1" rx="12"/>

  <!-- Grid -->
  <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.12" opacity="0.06"/>
  </pattern>
  <rect width="860" height="340" fill="url(#grid2)" rx="12"/>

  <!-- Header -->
  <text x="430" y="34" text-anchor="middle" fill="#00d97e" font-size="10" letter-spacing="6" opacity="0.4">AURA-CTX · IDENTITY LAYER</text>

  <!-- ═══ LAYER 1 — MEMORY (bottom) ═══ -->
  <rect x="40" y="240" width="780" height="68" rx="8" fill="#0f0f0f" stroke="#1e1e1e" stroke-width="1"/>
  <text x="60" y="261" fill="#333" font-size="9" letter-spacing="4">LAYER 1 · MEMORY</text>
  <text x="60" y="283" fill="#2a2a2a" font-size="11">What happened in past conversations</text>
  <text x="60" y="298" fill="#252525" font-size="9">session history · episodic recall · conversation summaries</text>

  <!-- Memory tools -->
  <rect x="560" y="250" width="72" height="24" rx="4" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="596" y="265" text-anchor="middle" fill="#2d2d2d" font-size="8.5">Mem0</text>

  <rect x="638" y="250" width="60" height="24" rx="4" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="668" y="265" text-anchor="middle" fill="#2d2d2d" font-size="8.5">Zep</text>

  <rect x="704" y="250" width="96" height="24" rx="4" fill="#141414" stroke="#222" stroke-width="1"/>
  <text x="752" y="265" text-anchor="middle" fill="#2d2d2d" font-size="8.5">DeltaMemory</text>

  <!-- ═══ LAYER 2 — CONTEXT (middle) ═══ -->
  <rect x="40" y="160" width="780" height="68" rx="8" fill="#0f0f0f" stroke="#222" stroke-width="1"/>
  <text x="60" y="181" fill="#3a3a3a" font-size="9" letter-spacing="4">LAYER 2 · CONTEXT</text>
  <text x="60" y="203" fill="#333" font-size="11">What the AI should know right now</text>
  <text x="60" y="218" fill="#2a2a2a" font-size="9">prompt engineering · RAG · document retrieval · agent context</text>

  <!-- Context tools -->
  <rect x="530" y="170" width="68" height="24" rx="4" fill="#141414" stroke="#252525" stroke-width="1"/>
  <text x="564" y="185" text-anchor="middle" fill="#383838" font-size="8.5">LACP</text>

  <rect x="604" y="170" width="96" height="24" rx="4" fill="#141414" stroke="#252525" stroke-width="1"/>
  <text x="652" y="185" text-anchor="middle" fill="#383838" font-size="8.5">Claudesidian</text>

  <rect x="706" y="170" width="94" height="24" rx="4" fill="#141414" stroke="#252525" stroke-width="1"/>
  <text x="753" y="185" text-anchor="middle" fill="#383838" font-size="8.5">BrainLayer</text>

  <!-- ═══ LAYER 3 — IDENTITY (top, highlighted) ═══ -->
  <rect x="40" y="56" width="780" height="92" rx="8" fill="#061410" stroke="#00d97e" stroke-width="1.5" filter="url(#softGlow)"/>

  <!-- Glow line at top of identity layer -->
  <rect x="40" y="56" width="780" height="3" rx="2" fill="#00d97e" opacity="0.6"/>

  <text x="60" y="85" fill="#00d97e" font-size="9" letter-spacing="4" opacity="0.8">LAYER 3 · IDENTITY</text>

  <!-- "aura" badge -->
  <rect x="686" y="66" width="114" height="28" rx="14" fill="#00d97e"/>
  <text x="743" y="84" text-anchor="middle" fill="#060606" font-size="10" font-weight="700" letter-spacing="1">✦ aura-ctx</text>

  <text x="60" y="110" fill="#00d97e" font-size="13" font-weight="500" filter="url(#softGlow)">Who you are, across everything</text>
  <text x="60" y="130" fill="#225533" font-size="9">your stack · your style · your rules · your role · structured · portable · owned by you</text>

  <!-- Vertical label on right -->
  <text x="845" y="200" text-anchor="middle" fill="#1a1a1a" font-size="8" letter-spacing="2" transform="rotate(90, 845, 200)">STACK</text>

  <!-- Separator lines between layers -->
  <line x1="40" y1="155" x2="820" y2="155" stroke="#0f0f0f" stroke-width="4"/>
  <line x1="40" y1="235" x2="820" y2="235" stroke="#0f0f0f" stroke-width="4"/>

  <!-- Left bracket decoration -->
  <line x1="25" y1="56" x2="25" y2="308" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="25" y1="56" x2="35" y2="56" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="25" y1="308" x2="35" y2="308" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Footer note -->
  <text x="430" y="326" text-anchor="middle" fill="#1e1e1e" font-size="8">Memory is session history · Context is prompt engineering · Identity is who you are</text>
</svg>
